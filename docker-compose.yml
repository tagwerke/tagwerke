# Tagwerke — one-command self-host stack.
#
#   1. cp .env.example .env   &&   edit .env (set SESSION_SECRET + POSTGRES_PASSWORD)
#   2. docker compose up -d --build
#   3. docker compose exec app npm run invite   # mint your first signup invite
#
# Two containers only: the app and its Postgres. Postgres is NOT published to the
# host — all data stays inside the compose network + a local named volume. The app
# makes no outbound network calls by default (SMTP/OIDC only if you configure them),
# so this runs fully air-gapped once images are pulled.
# See docs/self-hosting.md and docs/data-residency.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tagwerke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-tagwerke}
    volumes:
      - tagwerke-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tagwerke} -d ${POSTGRES_DB:-tagwerke}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No `ports:` on purpose — the database is reachable only by the app container.

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Assembled from POSTGRES_* so you set the password in one place.
      DATABASE_URL: postgres://${POSTGRES_USER:-tagwerke}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tagwerke}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      NODE_ENV: production
      PORT: "5174"
      # Public URL used in password-reset links (must be the real domain, not localhost).
      APP_URL: ${APP_URL:-http://localhost:5173}
      ORG_NAME: ${ORG_NAME:-Workspace}
      # Email (SES SMTP). Without these, reset emails fail in production.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "${APP_PORT:-5174}:5174"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5174/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  tagwerke-db:
